# AgentBoard 容器编排
#
# 默认启动（MariaDB 持久化）：
#   docker compose up -d
#   打开 http://localhost:8080  （Web 前端，浏览器经 http://localhost:8000 调 API）
#   API 文档：http://localhost:8000/docs
#   MariaDB 宿主机访问端口：13306（容器内 3306；AGENTBOARD_DB_URL 用 db:3306）
#
# 注意：AGENTBOARD_SECRET 为必填项，启动前需导出（如 export AGENTBOARD_SECRET=xxx）
#   或写入项目根 .env（勿提交）。
#
# 如需回退到本地 SQLite（开发）：
#   将 api.environment 的 AGENTBOARD_DB_URL 改回 sqlite:////app/data/agentboard.db
#   并恢复 api 的 volumes: - agentboard_data:/app/data（需同时恢复 volumes.agentboard_data）
#

# 生产域名部署：设置 Web 注入给浏览器的 API 地址
#   AGENTBOARD_WEB_API_URL=https://api.yourdomain.com docker compose up -d

services:
  api:
    build: .
    command: uvicorn agentboard.api:app --host 0.0.0.0 --port 8000
    environment:
      # 生产数据库：MariaDB（容器名 db，内部端口 3306）
      AGENTBOARD_DB_URL: "mysql+pymysql://agentboard:agentboard@db:3306/agentboard"
      # 生产务必改为强随机值（可用 openssl rand -hex 32 生成）
      AGENTBOARD_SECRET: "${AGENTBOARD_SECRET:?Set AGENTBOARD_SECRET to a strong random value}"
      # 远程部署默认保护 REST 业务接口；注册/登录和 /api/meta 保持公开
      AGENTBOARD_REQUIRE_AUTH: "1"
      # 临时开启注册以测试 MCP
      AGENTBOARD_ALLOW_REGISTRATION: "1"
      AGENTBOARD_TOKEN_TTL_SECONDS: "${AGENTBOARD_TOKEN_TTL_SECONDS:-2592000}"
      # 速率限制：300 req/60s/IP（开发环境避免测试时被 429 卡住）
      AGENTBOARD_RATE_LIMIT: "${AGENTBOARD_RATE_LIMIT:-300}"
      AGENTBOARD_RATE_WINDOW: "${AGENTBOARD_RATE_WINDOW:-60}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/meta').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build: .
    command: uvicorn agentboard.web_app:app --host 0.0.0.0 --port 8080
    environment:
      # 注：此地址由浏览器（用户机器）发起请求，必须用宿主机可访问地址，
      # 默认 localhost:8000 适用于本机 docker；生产改为真实域名/IP。
      AGENTBOARD_API_URL: "${AGENTBOARD_WEB_API_URL:-http://localhost:18000}"
    volumes:
      # 开发模式：挂载静态文件目录，更新样式后无需重建容器
      - ./agentboard/web/static:/app/agentboard/web/static:ro
    ports:
      - "28080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp:
    build: .
    command: python -m agentboard.mcp_server
    environment:
      AGENTBOARD_MCP_TRANSPORT: "http"
      AGENTBOARD_MCP_HOST: "0.0.0.0"
      AGENTBOARD_MCP_PORT: "8001"
      AGENTBOARD_MCP_PATH: "/mcp"
      AGENTBOARD_MCP_REQUIRE_AUTH: "0"
      AGENTBOARD_API_URL: "http://api:8000"
      # 必须与 API 完全一致，MCP 才能验证 Token
      AGENTBOARD_SECRET: "${AGENTBOARD_SECRET:?Set AGENTBOARD_SECRET to a strong random value}"
      AGENTBOARD_TOKEN_TTL_SECONDS: "${AGENTBOARD_TOKEN_TTL_SECONDS:-2592000}"
    ports:
      # 8001 被 Windows 系统保留 (Hyper-V 动态端口范围 7921-8020, 实测 8000-8082 整段不可用),
      # 改用 18001 暴露到宿主机 (容器内端口仍为 8001)
      - "18001:8001"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # 生产数据库：MariaDB（随 up -d 默认启动）
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: agentboard
      MARIADB_USER: agentboard
      MARIADB_PASSWORD: agentboard
      MARIADB_ROOT_PASSWORD: rootpass-change-me
    volumes:
      - agentboard_mariadb:/var/lib/mysql
    # 宿主机映射：主机 3306 已被占用，改用 13306 便于本地工具/迁移连接；
    # 容器内仍为 3306，AgentBoard 服务经 docker 网络 db:3306 访问。
    ports:
      - "13306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  agentboard_mariadb:
