{% extends "base.html" %}
{% block title %}AgentBoard · Projects{% endblock %}
{% block content %}
<h1>AgentBoard</h1>
<h2>项目</h2>
<ul>
  {% for p in projects %}
  <li><a href="/projects/{{ p.id }}">{{ p.name }}</a> {% if p.key %}<span class="meta">({{ p.key }})</span>{% endif %}</li>
  {% else %}
  <li class="meta">暂无项目</li>
  {% endfor %}
</ul>
<h3>新建项目</h3>
<form method="post" action="/projects">
  <input name="name" placeholder="名称" required>
  <input name="key" placeholder="短码 (可选)">
  <textarea name="description" rows="4" placeholder="描述 (markdown)"></textarea>
  <button>创建</button>
</form>
{% endblock %}
