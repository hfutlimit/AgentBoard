{% extends "base.html" %}
{% block title %}{{ task.title }}{% endblock %}
{% block content %}
<a class="back" href="/stories/{{ task.story_id }}">← Story</a>
<h1>{{ task.title }}
  <span class="badge {% if task.type == 'bug' %}bug{% endif %}">{{ task.type }}</span>
  <span class="badge">{{ task.status }}</span>
</h1>
<form method="post" action="/tasks/{{ task.id }}/status" style="border:0;background:none;padding:0">
  <label>状态：</label>
  <select name="status" onchange="this.form.submit()">
    {% for st in statuses %}<option value="{{ st }}" {% if st == task.status %}selected{% endif %}>{{ st }}</option>{% endfor %}
  </select>
</form>

<h2>Description</h2>
<div class="md">{{ desc_html | safe }}</div>

<h2>Spec (OpenSpec / Superpowers)</h2>
<div class="md">{{ spec_html | safe }}</div>

<h3>编辑 Description / Spec</h3>
<form method="post" action="/tasks/{{ task.id }}">
  <textarea name="description" rows="4" placeholder="description (markdown)">{{ task.description }}</textarea>
  <textarea name="spec" rows="10" placeholder="spec (markdown)">{{ task.spec }}</textarea>
  <button>保存</button>
</form>
{% endblock %}
