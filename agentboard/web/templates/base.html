<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>{% block title %}AgentBoard{% endblock %}</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; max-width: 880px; color: #222; }
  h1, h2, h3 { font-weight: 600; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul { line-height: 1.8; }
  .meta { color: #666; font-size: .85rem; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: .75rem; }
  .badge.bug { background: #fee2e2; color: #991b1b; }
  form { margin: 1rem 0; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
  input, textarea, select { width: 100%; padding: 6px; margin: 4px 0 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
  button { background: #2563eb; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
  .back { margin-bottom: 1rem; display: inline-block; }
  pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow: auto; }
  code { background: #f1f5f9; padding: 1px 4px; border-radius: 4px; }
  .md { background: #fff; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 8px; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
