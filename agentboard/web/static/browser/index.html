    <!-- Theme: detect system preference early to prevent FOUC -->
    <script>
      (function() {
        var saved = localStorage.getItem('agentboard-theme');
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        var dark = saved ? saved === 'dark' : mql.matches;
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>

  <!-- Theme toggle: inject button into topbar, sync with system preference -->
  <script>
    (function() {
      var STORAGE_KEY = 'agentboard-theme';
      var mql = window.matchMedia('(prefers-color-scheme: dark)');

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      }

      function setTheme(theme, persist) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
        if (persist) localStorage.setItem(STORAGE_KEY, theme);
        updateToggleIcon();
      }

      function updateToggleIcon() {
        var btn = document.getElementById('theme-toggle-btn');
        if (!btn) return;
        var isDark = getTheme() === 'dark';
        btn.innerHTML = isDark
          ? '<svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
          : '<svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        btn.title = isDark ? '切换到浅色模式' : '切换到深色模式';
      }

      function toggleTheme() {
        var current = getTheme();
        var next = current === 'dark' ? 'light' : 'dark';
        setTheme(next, true);
      }

      // Listen for system theme changes (only if user hasn't manually set preference)
      mql.addEventListener('change', function(e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
          setTheme(e.matches ? 'dark' : 'light', false);
        }
      });

      // Inject toggle button into topbar or login page when they appear
      var observer = new MutationObserver(function() {
        if (document.getElementById('theme-toggle-btn')) return;

        // Try topbar-right (main app), then login-card (auth page), then login-shell
        var container = document.querySelector('.topbar-right')
                     || document.querySelector('.login-card')
                     || document.querySelector('.login-shell');

        if (container) {
          var btn = document.createElement('button');
          btn.id = 'theme-toggle-btn';
          btn.className = 'theme-toggle';
          btn.setAttribute('aria-label', '切换主题');
          btn.addEventListener('click', toggleTheme);
          // For topbar: insert at beginning; for login card: append at end
          if (container.classList.contains('topbar-right')) {
            container.insertBefore(btn, container.firstChild);
          } else {
            container.appendChild(btn);
          }
          updateToggleIcon();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script></body>
