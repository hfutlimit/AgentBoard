<div class="login-page">
  <!-- 专业 IT 管理风格背景：科技网格 + 极光光晕 + 发光网络节点 -->
  <div class="login-bg" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>
    <div class="bg-glow bg-glow--3"></div>
    <svg class="bg-network" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <g class="net-lines">
        <line x1="120" y1="90" x2="220" y2="160" /><line x1="220" y1="160" x2="340" y2="80" />
        <line x1="340" y1="80" x2="480" y2="140" /><line x1="480" y1="140" x2="620" y2="90" />
        <line x1="620" y1="90" x2="700" y2="200" /><line x1="700" y1="200" x2="680" y2="330" />
        <line x1="680" y1="330" x2="560" y2="380" /><line x1="560" y1="380" x2="440" y2="300" />
        <line x1="440" y1="300" x2="300" y2="360" /><line x1="300" y1="360" x2="160" y2="300" />
        <line x1="160" y1="300" x2="120" y2="90" /><line x1="220" y1="160" x2="300" y2="360" />
        <line x1="480" y1="140" x2="440" y2="300" /><line x1="620" y1="90" x2="560" y2="380" />
        <line x1="700" y1="200" x2="700" y2="470" /><line x1="680" y1="330" x2="700" y2="470" />
        <line x1="560" y1="380" x2="560" y2="540" /><line x1="560" y1="540" x2="420" y2="470" />
        <line x1="420" y1="470" x2="260" y2="520" /><line x1="260" y1="520" x2="120" y2="470" />
        <line x1="120" y1="470" x2="160" y2="300" /><line x1="440" y1="300" x2="420" y2="470" />
        <line x1="380" y1="220" x2="480" y2="140" /><line x1="520" y1="250" x2="620" y2="90" />
        <line x1="520" y1="250" x2="440" y2="300" /><line x1="380" y1="220" x2="300" y2="360" />
      </g>
      <g class="net-nodes">
        <circle cx="120" cy="90" r="3" /><circle cx="220" cy="160" r="4" />
        <circle cx="340" cy="80" r="3" /><circle cx="480" cy="140" r="5" />
        <circle cx="620" cy="90" r="3" /><circle cx="700" cy="200" r="4" />
        <circle cx="160" cy="300" r="4" /><circle cx="300" cy="360" r="3" />
        <circle cx="440" cy="300" r="5" /><circle cx="560" cy="380" r="4" />
        <circle cx="680" cy="330" r="3" /><circle cx="120" cy="470" r="3" />
        <circle cx="260" cy="520" r="4" /><circle cx="420" cy="470" r="3" />
        <circle cx="560" cy="540" r="5" /><circle cx="700" cy="470" r="4" />
        <circle cx="380" cy="220" r="3" /><circle cx="520" cy="250" r="3" />
      </g>
    </svg>
    <div class="bg-vignette"></div>
  </div>

  <div class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <span class="logo-mark">AB</span>
        <h1>Agent<b>Board</b></h1>
        <p class="login-tagline">智能体协作与研发管理控制台</p>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab" [class.active]="mode === 'login'" (click)="mode === 'login' || switchMode()">登录</button>
        <button type="button" class="auth-tab" [class.active]="mode === 'register'" (click)="mode === 'register' || switchMode()">注册</button>
      </div>

      <form class="auth-form" (submit)="submit()">
        <label class="field">
          <span class="field-label">用户名</span>
          <input
            name="username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            required
            maxlength="64"
            autocomplete="username"
            placeholder="请输入用户名"
          />
        </label>
        <label class="field">
          <span class="field-label">密码</span>
          <input
            name="password"
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            required
            [minLength]="mode === 'register' ? 8 : 1"
            autocomplete="current-password"
            [placeholder]="mode === 'register' ? '至少 8 位' : '请输入密码'"
          />
        </label>
        <button type="submit" class="btn-primary block login-submit" [disabled]="submitting">
          {{ submitting ? '处理中…' : (mode === 'register' ? '注册并登录' : '登 录') }}
        </button>
      </form>

      <p class="login-hint muted">
        {{ mode === 'register' ? '创建账号以开始管理项目与 Agent 开发闭环' : '登录以继续管理项目与 Agent 开发闭环' }}
      </p>
    </section>

    <aside class="login-aside">
      <div class="aside-inner">
        <span class="aside-kicker">DEVOPS · AI AGENT OPS</span>
        <h2>让人类与 Agent<br />在同一处高效协作</h2>
        <ul class="aside-feats">
          <li><span class="feat-dot"></span>统一编排 Epic / Story / Task 研发闭环</li>
          <li><span class="feat-dot"></span>可视化 Sprint 燃尽与项目健康度</li>
          <li><span class="feat-dot"></span>定时 Agent 计划与自动化运行</li>
        </ul>
        <div class="aside-stats">
          <div class="aside-stat"><strong>AI</strong><span>驱动交付</span></div>
          <div class="aside-stat"><strong>实时</strong><span>协同看板</span></div>
          <div class="aside-stat"><strong>可观测</strong><span>运行轨迹</span></div>
        </div>
      </div>
    </aside>
  </div>
</div>
